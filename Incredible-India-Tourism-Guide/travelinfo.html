<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Travel Information | Incredible India</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        :root {
            --brand-green: #1b4d3e;
            --accent-green: #52796f;
        }
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background-color: #fdfdfd;
            color: #333;
        }

        h1 { color: #2f3e46; font-weight: 700; margin-bottom: 5px; }
        h2 { color: var(--brand-green); font-weight: 700; }
        
        .tagline { color: var(--accent-green); font-style: italic; font-size: 1.1rem; }

        .nav-pills .nav-link { 
            color: var(--brand-green);
            font-weight: 500;
            transition: 0.3s; 
        }

        .nav-pills .nav-link.active {
            background-color: var(--brand-green) !important;
            color: white !important;
        }

        /* Form Card Styling */
        .info-card {
            background: #fff;
            border-radius: 15px;
            border: none;
            box-shadow: 0 10px 30px rgba(0,0,0,0.08);
            padding: 30px;
            margin-bottom: 30px;
        }

        .form-label {
            font-weight: 600;
            color: var(--brand-green);
        }

        .btn-send {
            background-color: var(--brand-green);
            color: white;
            padding: 12px 40px;
            border-radius: 50px;
            font-weight: 700;
            border: none;
            transition: 0.3s;
        }
        .btn-send:hover {
            background-color: var(--accent-green);
            color: white;
            transform: translateY(-2px);
        }

        /* Footer */
        .main-footer {
            background-color: #2c3e50;
            color: #ffffff;
            padding: 40px 0;
            margin-top: 60px;
            border-top: 6px solid #cad2c5;
        }
        .footer-content p {
            margin: 0;
            font-size: 15px;
            letter-spacing: 2px;
            text-align: center;
            text-transform: uppercase;
        }
    </style>
</head>
<body>

    <header class="container pt-4 pb-2 text-center">
        <hr class="container opacity-25 my-4">
        <h1><strong>Travel Incredible India</strong></h1>
        <p class="tagline">"Beyond Imagination, Beyond Boundaries"</p>

        <nav class="d-flex justify-content-center mt-4">
            <ul class="nav nav-pills flex-wrap justify-content-center gap-2">
                <li class="nav-item"><a class="nav-link" href="./Incredibleindia.html">Home</a></li>
                <li class="nav-item"><a class="nav-link" href="./about.html">About</a></li>
                <li class="nav-item"><a class="nav-link" href="./states.html">States</a></li>
                <li class="nav-item"><a class="nav-link" href="./places.html">Places</a></li>
                <li class="nav-item"><a class="nav-link" href="./gallery.html">Gallery</a></li>
                <li class="nav-item"><a class="nav-link active" aria-current="page" href="./travelinfo.html">Travel Info</a></li>
                <li class="nav-item"><a class="nav-link" href="./contactus.html">Contact Us</a></li>
            </ul>
        </nav>
    </header>

    <hr class="container opacity-25 my-4">

    <main class="container">
        <div class="row justify-content-center">
            <div class="col-lg-8">
                <div class="info-card">
                    <h2 class="text-center mb-4">Trip Planner</h2>
                    <form>
                        <div class="row g-3">
                            <div class="col-md-12 mb-3">
                                <label class="form-label">Region :</label>
                                <select class="form-select form-select-lg border-2">
                                    <option disabled selected>Select Region You want to Travel</option>
                                    <option>North India</option>
                                    <option>South India</option>
                                    <option>East India</option>
                                    <option>West India</option>
                                    <option>Northeast India</option>
                                    <option>Central India</option>
                                </select>
                            </div>

                            <div class="col-md-6 mb-3">
                                <label for="f" class="form-label">From :</label> 
                                <input type="text" id="f" class="form-control border-2" placeholder="Enter your location"> 
                            </div>
                            <div class="col-md-6 mb-3">
                                <label for="to" class="form-label">To :</label>
                                <input id="to" type="text" class="form-control border-2" placeholder="Enter destination to travel">
                            </div>

                            <div class="col-md-6 mb-3">
                                <label for="dd" class="form-label">Departure Date :</label>
                                <input id="dd" type="date" class="form-control border-2">
                            </div>
                            <div class="col-md-6 mb-3">
                                <label for="rd" class="form-label">Return Date :</label>
                                <input id="rd" type="date" class="form-control border-2">
                            </div>

                            <div class="col-md-6 mb-3">
                                <label class="form-label">Travel Mode :</label>
                                <select class="form-select border-2">
                                    <option disabled selected>Select Mode</option>
                                    <option>By Plane</option>
                                    <option>By Car</option>
                                    <option>By Bus</option>
                                    <option>By Train</option>
                                </select>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label">Duration of Trip :</label>
                                <select class="form-select border-2">
                                    <option disabled selected>Select Duration</option>
                                    <option>1-2 day</option>
                                    <option>2-4 day</option>
                                    <option>5-7 days</option>
                                    <option>7-13 days</option>
                                    <option>More Than 13 days</option>
                                </select>
                            </div>

                            <div class="col-md-12 mb-4">
                                <label class="form-label">People :</label>
                                <select class="form-select border-2">
                                    <option disabled selected>How many people travelling</option>
                                    <option>1-2 </option>
                                    <option>2-4 </option>
                                    <option>5-7 </option>
                                    <option>7-13 </option>
                                    <option>More Than 13</option>
                                </select>
                            </div>

                            <div class="col-12 text-center">
                                <button type="submit" class="btn btn-send shadow-sm">Plan My Trip</button>
                            </div>
                        </div>
                    </form>
                </div>
            </div>
        </div>

        <div class="text-center mt-4">
            <a href="./Incredibleindia.html" class="btn btn-outline-dark rounded-pill px-4">Back to Home</a>
        </div>

    </main>

    <footer class="main-footer">
        <div class="footer-content">
            <p>&copy; 2026 Incredible India | Designed by Priyanshi</p>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
